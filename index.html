<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; }
      button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 25px; font-weight: bold; }
    </style>
  </head>

  <body>
    <div id="ui">
      <button onclick="placeModel()">TAP TO PLACE MODEL</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="myModel" src="https://raw.githubusercontent.com/GreenVigilante/Pindi_webar/main/your-model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#myModel" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      function placeModel() {
        console.log("Model anchored to the world coord!");
        // Logic to switch from 'Tracking' to 'Anchored' mode
      }
    </script>
  </body>
</html>
