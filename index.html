<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
}

#menu{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button{
padding:10px 16px;
font-size:16px;
border:none;
background:white;
border-radius:8px;
}
</style>
</head>

<body>

<model-viewer
id="viewer"
src="burger.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
style="width:100vw;height:100vh;">
</model-viewer>

<div id="menu">

<button onclick="changeDish('your-model.glb')">
Burger
</button>

<button onclick="changeDish('your-model.glb')">
Pizza
</button>

<button onclick="changeDish('your-model.glb')">
Cake
</button>

</div>

<script>

function changeDish(model){
document.getElementById("viewer").src=model;
}

</script>

</body>
</html>
