<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; overflow: hidden; }
  video { position: fixed; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index:-1; }
  canvas { position: fixed; top:0; left:0; }
  #arButton {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    font-size: 18px;
    background: white;
    border-radius: 10px;
    border: none;
    z-index: 10;
  }
</style>
</head>
<body>

<button id="arButton">Start AR</button>

<script type="module">

const button = document.getElementById("arButton");
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if (isIOS) {

  // 🍎 iPhone: Real AR using Quick Look
  button.innerText = "View in AR";
  button.onclick = () => {
    const link = document.createElement("a");
    link.setAttribute("rel", "ar");
    link.setAttribute("href", "your-model.usdz");
    link.setAttribute("style", "display:none");
    document.body.appendChild(link);
    link.click();
  };

} else {

  // 🤖 Android: Fake AR using camera overlay + Three.js
  button.innerText = "Start Camera AR";
  button.onclick = async () => {

    button.style.display = "none";

    // Video feed
    const video = document.createElement("video");
    video.autoplay = true;
    video.playsInline = true;
    video.style.position = "fixed";
    video.style.top = "0";
    video.style.left = "0";
    video.style.width = "100%";
    video.style.height = "100%";
    video.style.objectFit = "cover";
    video.style.zIndex = "-1";
    document.body.appendChild(video);

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    video.srcObject = stream;
    await video.play();

    // Import Three.js
    const THREE = await import("https://unpkg.com/three@0.158.0/build/three.module.js");
    const { GLTFLoader } = await import("https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    );
    camera.position.set(0, 0, 2);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.domElement.style.position = "fixed";
    renderer.domElement.style.top = "0";
    renderer.domElement.style.left = "0";
    document.body.appendChild(renderer.domElement);

    // Lighting
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(hemiLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7.5);
    scene.add(dirLight);

    // Load GLB model
    const loader = new GLTFLoader();
    loader.load(
      "your-model.glb",
      (gltf) => {
        const model = gltf.scene;

        // Auto center
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        // Auto scale
        const size = box.getSize(new THREE.Vector3()).length();
        const scale = 1.5 / size;
        model.scale.setScalar(scale);

        scene.add(model);
      },
      undefined,
      (error) => {
        console.error("Failed to load model:", error);
      }
    );

    // Gyroscope rotation
    window.addEventListener("deviceorientation", (event) => {
      if (event.beta && event.gamma) {
        camera.rotation.x = event.beta * Math.PI / 180;
        camera.rotation.y = event.gamma * Math.PI / 180;
      }
    });

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      scene.rotation.y += 0.003; // gentle rotation for demo
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  };

}

</script>

</body>
</html>
