<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; overflow: hidden; }
  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
  }
  #arButton {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    font-size: 18px;
    background: white;
    border-radius: 10px;
    border: none;
    z-index: 10;
  }
</style>
</head>
<body>

<button id="arButton">Start AR</button>

<script type="module">

// Detect iPhone / iPad
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

const button = document.getElementById("arButton");

if (isIOS) {

  // 🍎 REAL AR using AR Quick Look
  button.innerText = "View in AR";

  button.onclick = () => {
    const link = document.createElement("a");
    link.setAttribute("rel", "ar");
    link.setAttribute("href", "your-model.usdz");
    document.body.appendChild(link);
    link.click();
  };

} else {

  // 🤖 ANDROID FAKE AR (Camera Overlay)
  button.innerText = "Start Camera AR";

  button.onclick = async () => {

    button.style.display = "none";

    // Create camera video
    const video = document.createElement("video");
    video.autoplay = true;
    video.playsInline = true;
    document.body.appendChild(video);

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    video.srcObject = stream;

    // Load Three.js
    const THREE = await import("https://unpkg.com/three@0.158.0/build/three.module.js");
    const { GLTFLoader } = await import("https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js");

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth/window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
    scene.add(light);

    const loader = new GLTFLoader();
    loader.load("your-model.glb", gltf => {
      const model = gltf.scene;
      model.scale.set(1,1,1);
      scene.add(model);
    });

    // Gyroscope rotation
    window.addEventListener("deviceorientation", (event) => {
      if (event.beta && event.gamma) {
        camera.rotation.x = event.beta * Math.PI/180;
        camera.rotation.y = event.gamma * Math.PI/180;
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

  };
}

</script>
</body>
</html>
