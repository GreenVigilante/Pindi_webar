<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid AR Demo</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  body { margin:0; }
  model-viewer { width:100%; height:100vh; }
</style>
</head>
<body>

<model-viewer
    src="your-model.glb"
    ios-src="your-model.usdz"
    alt="3D Model"
    auto-rotate
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1">
</model-viewer>

</body>
</html>
